name: xalgo-voice-platform
label: Xalgo Voice
kind: platform
version: 2026.6.1
description: >
  Xalgo glasses voice gateway adapter for Hermes Agent.
  Connects Hermes to the Xalgo voice channel server over WebSocket, exchanges
  8-character binding codes for channel tokens, and relays voice turns and
  spoken replies.
author: Xalgo
requires_env:
  - name: XALGO_VOICE_TOKEN
    description: "Xalgo channel token returned by the binding exchange"
    prompt: "Xalgo Voice channel token"
    password: true
  - name: XALGO_VOICE_INSTANCE_ID
    description: "Stable Hermes instance identifier generated by setup"
    prompt: "Xalgo Voice instance ID"
    password: false
optional_env:
  - name: XALGO_VOICE_SERVER_URL
    description: "Xalgo WebSocket channel server URL"
    prompt: "WebSocket server URL"
    password: false
  - name: XALGO_VOICE_API_BASE_URL
    description: "Optional override for the Xalgo REST API base URL"
    password: false
  - name: XALGO_VOICE_DEVICE_LABEL
    description: "Device label shown in Xalgo app"
    prompt: "Device label"
    password: false
  - name: XALGO_VOICE_BOUND_USER_ID
    description: "Bound Xalgo user ID"
    prompt: "Bound user ID"
    password: false
  - name: XALGO_VOICE_BOUND_USER_NAME
    description: "Bound Xalgo user display name"
    prompt: "Bound user display name"
    password: false
  - name: XALGO_VOICE_REPLY_MODE
    description: "Reply mode: voice_first, text_first, or both"
    prompt: "Reply mode"
    password: false
  - name: XALGO_VOICE_STREAMING
    description: "Send replies as outbound_delta events"
    prompt: "Enable streaming replies? (true/false)"
    password: false
